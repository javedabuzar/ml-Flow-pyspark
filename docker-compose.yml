services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      TRAIN_MAX_ROWS: "50000"
      SPARK_DRIVER_MEMORY: "2g"
      MLFLOW_TRACKING_URI: "file:///app/mlruns"
    volumes:
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns --default-artifact-root /mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
