name: ML PySpark CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  train-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train PySpark model (sample)
        env:
          TRAIN_MAX_ROWS: "8000"
          SPARK_SHUFFLE_PARTITIONS: "4"
          RF_NUM_TREES: "20"
        run: python src/train.py

      - name: Run API tests
        env:
          TRAIN_MAX_ROWS: "8000"
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    needs: train-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flood-ml-pyspark:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name flood-api \
            -e TRAIN_MAX_ROWS=5000 \
            -e RF_NUM_TREES=10 \
            -e SPARK_SHUFFLE_PARTITIONS=2 \
            -p 8000:8000 \
            flood-ml-pyspark:${{ github.sha }}
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 10
          done
          docker logs flood-api
          exit 1
